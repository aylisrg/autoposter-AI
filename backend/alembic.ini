[alembic]
# Path is relative to the backend/ working directory (where `alembic` is
# invoked from). The SQLAlchemy URL is injected by env.py from
# `app.config.settings.db_url` so there is no secret to commit here.
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
# Render migration filenames like `0001_baseline.py`, `0002_add_retry.py`.
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
# Don't let Alembic try to resolve a URL itself — env.py does it.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
